<script>
function fibonacci(n) {
    if (n <= 0) return [];
    
    let tab = [];
    let a = 0, b = 1;
    
    for (let i = 0; i < n; i++) {
        tab.push(a);
        let temp = a + b;
        a = b;
        b = temp;
    }
    
    console.log(tab);
    return tab;
}
fibonacci(10);
</script>
